<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng Thông Tin Học Tập & Dự Án</title>
    <!-- Google Fonts: Montserrat & Quicksand mang lại cảm giác hiện đại, thanh lịch -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-jade: #00e6b4; /* Xanh ngọc phát sáng */
            --body-bg: #0b1110;     /* Nền tối sâu */
            --card-bg: rgba(16, 26, 24, 0.65); /* Thẻ tối huyền bí */
            --text-light: #e0f7f4;  /* Chữ sáng */
            --text-muted: #7da8a1;  /* Chữ mờ */
            /* Hiệu ứng đổ bóng 3D Neon và viền phát sáng */
            --shadow-3d: 0 20px 40px rgba(0, 0, 0, 0.5), 0 1px 0px rgba(255, 255, 255, 0.05);
            --neon-glow: 0 0 20px rgba(0, 230, 180, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle at 50% 0%, #132924 0%, var(--body-bg) 70%);
            color: var(--text-light);
            min-height: 100vh;
            padding-bottom: 60px;
            overflow-x: hidden;
        }

        /* Header Phong Cách Cyber Glassmorphic Tối */
        header {
            background: rgba(11, 17, 16, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 230, 180, 0.15);
            padding: 60px 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Biểu tượng thương hiệu cá nhân 3D Giả Lập Phát Sáng */
        .avatar-3d {
            width: 85px;
            height: 85px;
            background: linear-gradient(135deg, #00ffe0, #009e7a);
            border-radius: 24px;
            margin: 0 auto 20px auto;
            box-shadow: 0 0 30px rgba(0, 230, 180, 0.5),
                        inset 0 -5px 10px rgba(0,0,0,0.3),
                        inset 0 5px 10px rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transform: perspective(500px) rotateX(15deg);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: perspective(500px) rotateX(15deg) translateY(0); }
            50% { transform: perspective(500px) rotateX(15deg) translateY(-8px); }
        }

        .avatar-3d svg {
            width: 45px;
            height: 45px;
            fill: #0b1110;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 30%, var(--primary-jade));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        header p {
            font-size: 1.05rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 25px auto;
            font-weight: 500;
        }

        /* KHỐI THÔNG TIN LIÊN HỆ CÁ NHÂN 3D MƯỚT */
        .contact-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            max-width: 600px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .contact-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 12px 24px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 10px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(0, 230, 180, 0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .contact-item:hover {
            transform: translateY(-4px);
            background: rgba(0, 230, 180, 0.08);
            border-color: var(--primary-jade);
            box-shadow: 0 0 20px rgba(0, 230, 180, 0.3);
            color: var(--primary-jade);
        }

        .contact-item svg {
            color: var(--primary-jade);
        }

        /* Thanh Tìm Kiếm Đổ Khối Cyber */
        .utility-bar {
            max-width: 650px;
            margin: -32px auto 50px auto;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .search-box {
            display: flex;
            background: #14201d;
            padding: 8px;
            border-radius: 20px;
            box-shadow: var(--shadow-3d), 0 0 30px rgba(0,0,0,0.6);
            border: 1px solid rgba(0, 230, 180, 0.2);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 16px;
            outline: none;
            color: var(--text-light);
            font-family: 'Quicksand', sans-serif;
            font-weight: 500;
        }

        .search-box input::placeholder {
            color: #4a6b65;
        }

        .search-box .counter-badge {
            background: linear-gradient(135deg, #102d27, #0b1f1b);
            color: var(--primary-jade);
            padding: 0 20px;
            display: flex;
            align-items: center;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 700;
            border: 1px solid rgba(0, 230, 180, 0.15);
        }

        /* Lưới hiển thị các dự án */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .portal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 35px;
        }

        /* Thiết kế Thẻ Ngọc Bích 3D Tối Cao Cấp */
        .web-card {
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: var(--shadow-3d);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* Hiệu ứng bừng sáng ngọc bích khi di chuột */
        .web-card:hover {
            transform: translateY(-10px) scale(1.01);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 25px rgba(0, 230, 180, 0.15);
            border-color: rgba(0, 230, 180, 0.3);
            background: rgba(16, 26, 24, 0.85);
        }

        .card-body {
            padding: 30px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Icon trang trí phát sáng nhạt */
        .card-icon {
            width: 48px;
            height: 48px;
            background: rgba(0, 230, 180, 0.06);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            color: var(--primary-jade);
            border: 1px solid rgba(0, 230, 180, 0.15);
        }

        .card-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 12px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 3.6rem;
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 22px;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-weight: 500;
            line-height: 1.6;
        }

        .card-meta {
            font-size: 0.8rem;
            color: #55827b;
            padding-top: 18px;
            border-top: 1px dashed rgba(0, 230, 180, 0.15);
            margin-bottom: 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* NÚT BẤM DUYỆT 3D CHUYÊN NGHIỆP PHÁT SÁNG */
        .card-btn {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, #00ffe0 0%, #00a883 100%);
            color: #050a09;
            font-weight: 800;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 18px;
            font-size: 0.95rem;
            letter-spacing: 0.8px;
            transition: all 0.2s ease;
            position: relative;
            /* Khối 3D dày dưới chân nút */
            box-shadow: 0 5px 0px #00664f, 0 10px 20px rgba(0, 230, 180, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Hiệu ứng nhấn nút lún khối chân thực */
        .card-btn:hover {
            filter: brightness(1.1);
            transform: translateY(2px);
            box-shadow: 0 3px 0px #00664f, 0 6px 12px rgba(0, 230, 180, 0.2);
        }

        .card-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0px #00664f, 0 2px 5px rgba(0, 230, 180, 0.1);
        }

        /* Màn hình chờ hiệu ứng mướt */
        .loading-container {
            text-align: center;
            padding: 100px 0;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(0, 230, 180, 0.05);
            border-top: 4px solid var(--primary-jade);
            border-radius: 50%;
            margin: 0 auto 25px auto;
            animation: spin 1s linear infinite;
            box-shadow: var(--neon-glow);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Footer */
        footer {
            margin-top: 100px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        footer a {
            color: var(--primary-jade);
            text-decoration: none;
            font-weight: 700;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .portal-grid { grid-template-columns: 1fr; }
            .contact-container { flex-direction: column; align-items: center; gap: 12px; }
        }
    </style>
</head>
<body>

    <!-- Header Cá Nhân Hóa Đậm Chất Thần Thái Tối -->
    <header>
        <div class="avatar-3d">
            <svg viewBox="0 0 24 24">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
        </div>
        <h1>CỔNG DỰ ÁN & TIỆN ÍCH</h1>
        <p>Không gian lưu trữ và truy cập nhanh các website, ứng dụng trực tuyến cao cấp.</p>
        
        <!-- Thông tin liên hệ cá nhân -->
        <div class="contact-container">
            <a href="tel:0888819957" class="contact-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                Hotline: 0888.819.957
            </a>
            <a href="mailto:thindo7602@gmail.com" class="contact-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                thindo7602@gmail.com
            </a>
        </div>
    </header>

    <!-- Thanh tìm kiếm -->
    <div class="utility-bar">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Tìm nhanh ứng dụng, bài học..." oninput="filterCards()">
            <div class="counter-badge" id="counter-badge">Đang quét...</div>
        </div>
    </div>

    <!-- Vùng hiển thị chính -->
    <main>
        <div class="loading-container" id="loading-area">
            <div class="spinner"></div>
            <p style="color: var(--text-muted); font-weight: 700;">Hệ thống đang đồng bộ dữ liệu ngọc bích 3D...</p>
        </div>

        <div class="portal-grid" id="portal-grid" style="display: none;"></div>
    </main>

    <footer>
        <p>© Hệ thống đồng bộ tự động Portal 3D • Tài khoản: <a href="https://github.com/thindo7602-glitch" target="_blank">thindo7602-glitch</a></p>
    </footer>

    <script>
        const GITHUB_USERNAME = "thindo7602-glitch";
        let allPages = [];

        function formatTitle(name) {
            let title = name.replace(/-/g, ' ');
            title = title.replace('.github.io', ' (Trang Chủ)');
            return title;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return `${date.getDate()}/${date.getMonth() + 1}/${date.getFullYear()}`;
        }

        async function initPortal() {
            const grid = document.getElementById('portal-grid');
            const loadingArea = document.getElementById('loading-area');
            const counterBadge = document.getElementById('counter-badge');

            try {
                const response = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?per_page=100&sort=updated`);
                if (!response.ok) throw new Error("Không đồng bộ được danh sách.");

                const repos = await response.json();
                allPages = repos.filter(repo => repo.has_pages);

                counterBadge.innerText = `${allPages.length} Dự Án`;
                loadingArea.style.display = 'none';
                grid.style.display = 'grid';

                if (allPages.length === 0) {
                    grid.innerHTML = `<div style="text-align:center; grid-column: 1/-1; padding: 40px; color: var(--text-muted); font-weight:700;">Chưa kích hoạt trang trực tuyến nào.</div>`;
                    return;
                }

                renderCards(allPages);
            } catch (error) {
                loadingArea.innerHTML = `<p style="color: #ff6b6b; font-weight:700;">Lỗi kết nối GitHub API.</p>`;
                counterBadge.innerText = "Lỗi";
            }
        }

        function renderCards(dataList) {
            const grid = document.getElementById('portal-grid');
            grid.innerHTML = "";

            dataList.forEach(repo => {
                const card = document.createElement('div');
                card.className = 'web-card';
                
                const title = formatTitle(repo.name);
                const desc = repo.description || "Ứng dụng trực tuyến phục vụ công tác dạy học và lưu trữ tài nguyên số cá nhân.";
                const webUrl = `https://${GITHUB_USERNAME}.github.io/${repo.name === GITHUB_USERNAME + '.github.io' ? '' : repo.name}`;
                const updatedDate = formatDate(repo.updated_at);

                card.innerHTML = `
                    <div class="card-body">
                        <div class="card-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 22 22 22"></polygon></svg>
                        </div>
                        <div class="card-title" title="${title}">${title}</div>
                        <div class="card-desc">${desc}</div>
                        <div class="card-meta">
                            <span>📅 Cập nhật: ${updatedDate}</span>
                            <span style="font-weight:700; color: var(--primary-jade);">SYSTEM</span>
                        </div>
                        <a href="${webUrl}" target="_blank" class="card-btn">MỞ ỨNG DỤNG</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterCards() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const counterBadge = document.getElementById('counter-badge');
            
            const filtered = allPages.filter(repo => {
                const title = formatTitle(repo.name).toLowerCase();
                const desc = (repo.description || "").toLowerCase();
                return title.includes(query) || desc.includes(query);
            });

            counterBadge.innerText = `${filtered.length} Kết quả`;
            renderCards(filtered);
        }

        window.addEventListener('DOMContentLoaded', initPortal);
    </script>
</body>
</html>
