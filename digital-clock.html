<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Timezone Digital Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #2a1a4f 100%);
    color: #00ff88;
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  .container {
    max-width: 1200px;
    width: 100%;
  }

  header {
    text-align: center;
    margin-bottom: 50px;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 3px;
    background: linear-gradient(90deg, #00ff88, #00ccff, #ff00ff, #00ff88);
    background-size: 300% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 8s linear infinite;
    margin-bottom: 10px;
  }

  @keyframes gradientShift {
    0% { background-position: 0% center; }
    100% { background-position: 300% center; }
  }

  .subtitle {
    font-size: 1rem;
    color: #00ccff;
    opacity: 0.8;
    letter-spacing: 2px;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  button {
    padding: 10px 20px;
    background: rgba(0, 255, 136, 0.1);
    border: 2px solid #00ff88;
    color: #00ff88;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.3s ease;
    text-transform: uppercase;
    font-weight: 700;
    letter-spacing: 1px;
  }

  button:hover {
    background: rgba(0, 255, 136, 0.2);
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
    transform: translateY(-2px);
  }

  button.active {
    background: #00ff88;
    color: #0a0e27;
    box-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
  }

  .clock-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
    margin-bottom: 40px;
  }

  .clock-card {
    background: linear-gradient(135deg, rgba(0, 255, 136, 0.05), rgba(0, 204, 255, 0.05));
    border: 2px solid rgba(0, 255, 136, 0.3);
    border-radius: 15px;
    padding: 25px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    box-shadow: 0 8px 32px rgba(0, 255, 136, 0.1);
    position: relative;
    overflow: hidden;
  }

  .clock-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, transparent, rgba(0, 255, 136, 0.1), transparent);
    pointer-events: none;
  }

  .clock-card:hover {
    border-color: #00ff88;
    box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
    transform: translateY(-5px);
  }

  .timezone-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .timezone-region {
    font-size: 0.85rem;
    color: #00ccff;
    margin-bottom: 15px;
    opacity: 0.8;
  }

  .digital-time {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 900;
    letter-spacing: 2px;
    margin: 15px 0;
    text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
    color: #00ff88;
  }

  .time-details {
    font-size: 0.9rem;
    color: #00ccff;
    margin-top: 10px;
    opacity: 0.7;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #00ff88, transparent);
    margin: 15px 0;
  }

  .am-pm {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 1px;
    color: #ff00ff;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    background: rgba(0, 255, 136, 0.05);
    border: 2px solid rgba(0, 255, 136, 0.2);
    border-radius: 15px;
    padding: 25px;
    margin-top: 40px;
  }

  .stat-item {
    text-align: center;
  }

  .stat-label {
    font-size: 0.9rem;
    color: #00ccff;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    color: #00ff88;
    text-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
  }

  .timezone-select {
    background: rgba(0, 255, 136, 0.1);
    border: 2px solid #00ff88;
    color: #00ff88;
    padding: 10px 15px;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .timezone-select:hover {
    background: rgba(0, 255, 136, 0.2);
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
  }

  .timezone-select:focus {
    outline: none;
    box-shadow: 0 0 30px rgba(0, 255, 136, 0.7);
  }

  .custom-timezone-section {
    background: rgba(0, 255, 136, 0.05);
    border: 2px solid rgba(0, 255, 136, 0.2);
    border-radius: 15px;
    padding: 25px;
    margin-top: 30px;
  }

  .custom-timezone-section h3 {
    font-family: 'Orbitron', sans-serif;
    margin-bottom: 15px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #00ff88;
  }

  .input-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  input[type="text"] {
    flex: 1;
    min-width: 150px;
    padding: 10px 15px;
    background: rgba(0, 255, 136, 0.1);
    border: 2px solid #00ff88;
    color: #00ff88;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    transition: all 0.3s ease;
  }

  input[type="text"]::placeholder {
    color: rgba(0, 255, 136, 0.5);
  }

  input[type="text"]:focus {
    outline: none;
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
  }

  input[type="number"] {
    width: 80px;
    padding: 10px;
    background: rgba(0, 255, 136, 0.1);
    border: 2px solid #00ff88;
    color: #00ff88;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
  }

  input[type="number"]:focus {
    outline: none;
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
  }

  footer {
    text-align: center;
    margin-top: 50px;
    font-size: 0.9rem;
    color: #00ccff;
    opacity: 0.6;
    letter-spacing: 1px;
  }

  @media (max-width: 768px) {
    .clock-grid {
      grid-template-columns: 1fr;
    }

    h1 {
      font-size: 2rem;
    }

    .digital-time {
      font-size: 2rem;
    }
  }

  .blinking {
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 49%, 100% { opacity: 1; }
    50%, 99% { opacity: 0.3; }
  }

  .remove-btn {
    background: rgba(255, 100, 100, 0.1);
    border-color: #ff6464;
    color: #ff6464;
    padding: 5px 10px;
    font-size: 0.8rem;
    margin-top: 10px;
    width: 100%;
  }

  .remove-btn:hover {
    background: rgba(255, 100, 100, 0.2);
    box-shadow: 0 0 20px rgba(255, 100, 100, 0.5);
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>⏰ Global Time Zone Clock</h1>
    <p class="subtitle">Real-time across the world</p>
  </header>

  <div class="controls">
    <button id="btnFormat" class="active">24H Format</button>
    <button id="btnToggleDate">Show Date</button>
    <button id="btnReset">Reset to Default</button>
  </div>

  <div class="clock-grid" id="clockGrid"></div>

  <div class="custom-timezone-section">
    <h3>➕ Add Custom Timezone</h3>
    <div class="input-group">
      <input type="text" id="customName" placeholder="e.g., Custom City">
      <input type="number" id="customOffset" placeholder="UTC Offset" min="-12" max="14" step="0.5">
      <button onclick="addCustomTimezone()">Add Timezone</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-item">
      <div class="stat-label">Timezones Active</div>
      <div class="stat-value" id="statTimezones">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Local Time</div>
      <div class="stat-value" id="statLocal">00:00</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">UTC Time</div>
      <div class="stat-value" id="statUTC">00:00</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Earliest Zone</div>
      <div class="stat-value" id="statEarliest">UTC-12</div>
    </div>
  </div>
</div>

<footer>
  <p>🌍 Multi-Timezone Digital Clock Dashboard | Real-time Update Every Second</p>
</footer>

<script>
const DEFAULT_TIMEZONES = [
  { name: 'UTC', region: 'Coordinated Universal', offset: 0 },
  { name: 'EST', region: 'Eastern Standard (USA)', offset: -5 },
  { name: 'CST', region: 'Central Standard (USA)', offset: -6 },
  { name: 'MST', region: 'Mountain Standard (USA)', offset: -7 },
  { name: 'PST', region: 'Pacific Standard (USA)', offset: -8 },
  { name: 'GMT', region: 'Greenwich Mean', offset: 0 },
  { name: 'CET', region: 'Central European', offset: 1 },
  { name: 'IST', region: 'Indian Standard', offset: 5.5 },
  { name: 'JST', region: 'Japan Standard', offset: 9 },
  { name: 'AEST', region: 'Australia Eastern', offset: 10 },
  { name: 'NZST', region: 'New Zealand Standard', offset: 12 },
];

let timezones = JSON.parse(localStorage.getItem('timezones')) || DEFAULT_TIMEZONES;
let use24HourFormat = JSON.parse(localStorage.getItem('use24HourFormat')) !== false;
let showDate = JSON.parse(localStorage.getItem('showDate')) || false;

function formatTime(date, offset, use24Hour) {
  const utc = date.getTime() + date.getTimezoneOffset() * 60000;
  const tzDate = new Date(utc + 3600000 * offset);

  let hours = tzDate.getHours();
  const minutes = String(tzDate.getMinutes()).padStart(2, '0');
  const seconds = String(tzDate.getSeconds()).padStart(2, '0');

  let ampm = '';
  if (!use24Hour) {
    ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;
  }

  const hoursStr = String(hours).padStart(2, '0');
  return {
    time: `${hoursStr}:${minutes}:${seconds}`,
    ampm: ampm,
    date: tzDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
  };
}

function renderClocks() {
  const now = new Date();
  const gridEl = document.getElementById('clockGrid');
  gridEl.innerHTML = '';

  timezones.forEach((tz, index) => {
    const { time, ampm, date } = formatTime(now, tz.offset, use24HourFormat);
    
    const card = document.createElement('div');
    card.className = 'clock-card';
    card.innerHTML = `
      <div class="timezone-name">${tz.name}</div>
      <div class="timezone-region">${tz.region}</div>
      <div class="divider"></div>
      <div class="digital-time">${time}</div>
      ${!use24HourFormat ? `<div class="am-pm">${ampm}</div>` : ''}
      ${showDate ? `<div class="time-details">${date}</div>` : ''}
      <div class="time-details">UTC ${tz.offset >= 0 ? '+' : ''}${tz.offset}</div>
      ${index >= DEFAULT_TIMEZONES.length ? `<button class="remove-btn" onclick="removeTimezone(${index})">Remove</button>` : ''}
    `;
    gridEl.appendChild(card);
  });

  updateStats(now);
}

function updateStats(now) {
  document.getElementById('statTimezones').textContent = timezones.length;

  const localTime = formatTime(now, 0, use24HourFormat);
  document.getElementById('statLocal').textContent = localTime.time;

  const utcTime = formatTime(now, 0, use24HourFormat);
  document.getElementById('statUTC').textContent = utcTime.time;

  const minOffset = Math.min(...timezones.map(tz => tz.offset));
  document.getElementById('statEarliest').textContent = `UTC ${minOffset >= 0 ? '+' : ''}${minOffset}`;
}

function addCustomTimezone() {
  const name = document.getElementById('customName').value.trim();
  const offset = parseFloat(document.getElementById('customOffset').value);

  if (!name) {
    alert('Please enter a timezone name');
    return;
  }

  if (isNaN(offset) || offset < -12 || offset > 14) {
    alert('Please enter a valid UTC offset (-12 to +14)');
    return;
  }

  timezones.push({ name: name.toUpperCase(), region: name, offset: offset });
  localStorage.setItem('timezones', JSON.stringify(timezones));
  document.getElementById('customName').value = '';
  document.getElementById('customOffset').value = '';
  renderClocks();
}

function removeTimezone(index) {
  timezones.splice(index, 1);
  localStorage.setItem('timezones', JSON.stringify(timezones));
  renderClocks();
}

function resetToDefault() {
  timezones = DEFAULT_TIMEZONES;
  localStorage.setItem('timezones', JSON.stringify(timezones));
  renderClocks();
}

document.getElementById('btnFormat').addEventListener('click', function() {
  use24HourFormat = !use24HourFormat;
  localStorage.setItem('use24HourFormat', use24HourFormat);
  this.textContent = use24HourFormat ? '24H Format' : '12H Format';
  renderClocks();
});

document.getElementById('btnToggleDate').addEventListener('click', function() {
  showDate = !showDate;
  localStorage.setItem('showDate', showDate);
  this.classList.toggle('active', showDate);
  renderClocks();
});

document.getElementById('btnReset').addEventListener('click', resetToDefault);

renderClocks();

setInterval(() => {
  renderClocks();
}, 1000);
</script>

</body>
</html>
